name: Ghost Writer Workflow

on:
  push:
    branches:
      - 'feat/**' # 当推送到以 feat/ 开头的分支时触发

permissions:
  contents: write # 授予机器人写入代码的权限

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: 运行 AI 创作脚本
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }} # 从 GitHub Secrets 读取密钥
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python scripts/writer.py

      - name: 提交并推送章节
        run: |
          git config --global user.name "GhostWriter-Bot"
          git config --global user.email "bot@github.com"
          git add chapters/
          git diff --quiet && git diff --staged --quiet || (git commit -m "AI: 自动生成新章节" && git push)
