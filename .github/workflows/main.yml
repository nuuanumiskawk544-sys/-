name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: # 手动启动
  push:
    branches:
      - main
    # 核心功能：以下文件变动时不触发自动续写
    paths-ignore:
      - 'README.md'
      - '四合院：我的空间能产肉，众禽馋疯了 大纲.txt'
      - 'chapters/**'  # 手动精修章节时不触发
      - '.github/workflows/**' # 修改工作流时不触发

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    # 逻辑优化：手动启动或不含停止信号的推送才运行
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '停止')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作新章节
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 自动审稿
        run: |
          if [ -f "scripts/reviewer.py" ]; then
            python scripts/reviewer.py
          fi

      - name: 统一同步并推送更改
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 配置身份
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. 拉取远程更新，防止提交冲突
          git pull origin main --rebase
          
          # 3. 将新生成的章节和状态卡加入暂存区
          mkdir -p chapters
          git add chapters/*.md
          git add world_state.json
          
          # 4. 检查是否有实际改动（关键：防止 Exit code 1）
          if git diff --staged --quiet; then
            echo "⚠️ 没有检测到内容更新（章节或状态卡），流程结束。"
          else
            # 统计当前总章节数
            COUNT=$(ls chapters/*.md 2>/dev/null | wc -l)
            echo "🚀 检测到更新，正在推送第 ${COUNT} 章及最新状态卡..."
            
            # 5. 执行单次提交并推送
            # 提交信息中不包含 [skip ci]，以便触发下一轮自动续写（实现无限循环）
            git commit -m "自动续写: 第 ${COUNT} 章及世界状态卡同步"
            git push origin main
          fi
