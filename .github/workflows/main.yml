name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '*.txt'
      - 'chapters/**'
      - '.github/workflows/**'

permissions:
  contents: write 

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 显式使用 Token

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作并同步状态
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 统一同步并推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 信任目录，防止 Git 报错
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # 2. 配置身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 3. 强制同步远程状态，解决冲突导致的 128 错误
          git pull origin main --rebase
          
          # 4. 添加变动
          git add chapters/*.md world_state.json
          
          # 5. 提交并推送
          if git diff --staged --quiet; then
            echo "⚠️ 无变动，跳过推送。"
          else
            COUNT=$(ls chapters/*.md 2>/dev/null | wc -l)
            git commit -m "自动续写: 第 ${COUNT} 章及状态同步"
            # 显式指定推送目标
            git push origin main
          fi
