name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: # 保留手动开关，你可以随时点火启动
  push:
    branches:
      - main
    # 核心功能：以下文件发生变动时，不触发自动续写
    paths-ignore:
      - 'README.md'
      - '四合院：我的空间能产肉，众禽馋疯了 大纲.txt'
      - 'chapters/**'  # 当你手动删除或精修章节时，不触发续写
      - '.github/workflows/**' # 修改工作流文件本身时不触发

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    # 逻辑优化：手动启动(workflow_dispatch)时强制运行；
    # 自动推送时，只有不含 [skip ci] 且不含“停止”才运行。
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '停止')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作新章节
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 自动审稿
        run: |
          if [ -f "scripts/reviewer.py" ]; then
            python scripts/reviewer.py
          fi

      - name: 安全同步并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          mkdir -p chapters
          git pull origin main --rebase
          git add chapters/
          git add world_state.json  #


      - name: 提交并推送更改
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
         git config --local user.email "action@github.com"
         git config --local user.name "GitHub Action"
         git add chapters/* world_state.json  # 🚨 确保包含此文件
         # 下面这一行最容易在 34 行左右报错，加入了 || echo 防止无变化时崩溃
         git commit -m "自动更新剧情进度及状态卡" || exit 0
         git push  
         
    
          if git diff --staged --quiet; then
            echo "⚠️ 没有新章节，流程自然结束。"
          else
            COUNT=$(ls chapters/*.md 2>/dev/null | wc -l)
            # 推送时不带 [skip ci]，确保下一轮循环可以正常开启
            git commit -m "自动续写: 第 ${COUNT} 章"
            git push origin main
          fi
