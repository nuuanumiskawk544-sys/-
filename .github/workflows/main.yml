name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '*.txt'
      - 'chapters/**'
      - '.github/workflows/**'

permissions:
  contents: write 

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 显式使用 Token

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作并同步状态
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 统一提交并推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 强制添加所有变动，包括 md 章节和 json 状态卡
          git add chapters/*.md
          git add world_state.json
          
          # 2. 拉取远程更新，防止 128 错误（由于 2 小时前可能有其他变动）
          git pull origin main --rebase
          
          # 3. 只有在有变动时才提交
          if git diff --staged --quiet; then
            echo "⚠️ 检测到 world_state.json 和章节均未变动，跳过推送。"
          else
            git commit -m "自动续写：同步第 $(ls chapters/*.md | wc -l) 章剧情及世界状态 [skip ci]"
            git push origin main
          fi
