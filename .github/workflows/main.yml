name: Infinite Ghost Writer

on:
  push:
    branches:
      - main  # 只要 main 分支有更新，就触发下一章
  workflow_dispatch: # 允许你手动点击按钮开始第一章

permissions:
  contents: write

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    # 防止死循环失控，设置单次任务超时时间
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: AI Write
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_REF_NAME: main
        run: python scripts/writer.py

      - name: Push to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chapters/
          # 如果有新章节，则提交并推送到 main
          git diff --staged --quiet || (git commit -m "自动续写新章节 [skip ci]" && git push origin main)
