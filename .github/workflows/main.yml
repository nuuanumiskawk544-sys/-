name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '*.txt'
      - 'chapters/**'
      - '.github/workflows/**'

permissions:
  contents: write 
  actions: write
  
jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    timeout-minutes: 10  
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: 第一步：补全历史剧情摘要（含原文背景）
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          if [ -f "fix_history.py" ]; then
            python fix_history.py
          else
            echo "未找到 fix_history.py，跳过记忆补全。"
          fi

      - name: 第二步：运行小说生成脚本
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          if [ -f "scripts/init_history.py" ]; then
            python scripts/init_history.py
          else
            echo "错误：脚本 scripts/init_history.py 不存在！"
            exit 1
          fi

      - name: 第三步：统一提交并推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # 1. 添加所有变动
          git add world_state.json
          git add chapters/*.md || echo "No new chapters"
          
          # 2. 检查并执行提交
          if git diff --staged --quiet; then
            echo "没有检测到任何文件变动，跳过提交。"
          else
            # 使用包含日期的提交信息并包含 [skip ci] 防止死循环
            git commit -m "自动续写同步：第 $(date +%F) 章节及摘要 [skip ci]"
            
            # 3. 拉取远程，解决冲突
            git pull origin main --rebase
            
            # 4. 推送
            git push origin main
          fi
