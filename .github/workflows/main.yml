name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '*.txt'
      - 'chapters/**'
      - '.github/workflows/**'

permissions:
  contents: write 
  actions: write
  
jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: 自动补全历史记忆索引
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          # 如果文件存在则运行，不存在则跳过，保证不报错
          if [ -f "fix_history.py" ]; then
            python fix_history.py
          fi
      - name: AI 创作并同步状态
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 统一提交并推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # 1. 添加所有变动
          git add world_state.json
          git add chapters/*.md || echo "No new chapters"
          
          # 2. 先提交到本地仓库（让工作区变干净）
          if git diff --staged --quiet; then
            echo "没有检测到任何文件变动，跳过提交。"
          else
            git commit -m "自动续写同步 [skip ci]"
            
            # 3. 再拉取远程，解决冲突
            git pull origin main --rebase
            
            # 4. 最后推送
            git push origin main
          fi
