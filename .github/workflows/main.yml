name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: # 手动点击按钮启动
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'chapters/**' # 防止自身推送陷入死循环

permissions:
  contents: write

env:
  # 解决你收到的 Node.js 弃用警告，强制使用 Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    # 如果提交信息包含“完结”，则彻底停止自动化
    if: "!contains(github.event.head_commit.message, '完结')"
    
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史防止 push 失败

      - name: 设置 Python 环境
        uses: actions/setup-python@v5 # 升级到 v5 以更好地支持 Node 24
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作新章节
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 自动审稿与纠错
        run: |
          if [ -f "scripts/reviewer.py" ]; then
            python scripts/reviewer.py
          else
            echo "未发现审稿脚本，跳过质检。"
          fi

      - name: 自动同步并推送至 Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 核心修复：确保目录存在且逻辑严密
          mkdir -p chapters
          
          # 拉取最新远程代码防止冲突
          git pull origin main --rebase
          
          git add chapters/
          
          # 检查是否有文件变动 (修复 Exit code 2)
          if git diff --staged --quiet; then
            echo "⚠️ 本次未生成新章节，流程结束。"
          else
            # 获取当前章节总数
            COUNT=$(ls chapters/*.md 2>/dev/null | wc -l)
            git commit -m "自动续写新章节: 第 ${COUNT} 章"
            git push origin main
          fi
