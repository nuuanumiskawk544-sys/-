name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '*.txt'
      - 'chapters/**'
      - '.github/workflows/**'

permissions:
  contents: write 
  actions: write
  
jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作并同步状态
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 统一提交并推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          git add chapters/*.md
          git add world_state.json
          
          git pull origin main --rebase
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            CHAPTER_COUNT=$(ls chapters/*.md 2>/dev/null | wc -l)
            git commit -m "自动续写：第 ${CHAPTER_COUNT} 章及状态同步 [skip ci]"
            git push origin main
          fi
