name: Infinite Ghost Writer

on:
  workflow_dispatch: # 强烈建议：通过手动点击按钮来开启“第一章”
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md' # 忽略 README 的修改，防止你改设定时触发乱码

permissions:
  contents: write

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '完结')" # 如果提到完结，则彻底停止
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取完整历史，否则 push 必报 128 或 1

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作章节
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      - name: 内容自动质检与纠错
        run: python scripts/checker.py  # 插入质检脚本

      - name: 自动同步并推送
        # 如果上一步退出码为 1，这一步将不会执行，保护了仓库内容的纯洁性
        run: |
          git config --global user.name "github-actions[bot]"
          ... (后续推送逻辑不变)
      - name: 自动同步并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 先拉取最新更改，防止 OOS 冲突
          git pull origin main --rebase
          
          git add chapters/
          
          # 检查是否有新章节
          if git diff --staged --quiet; then
            echo "没有新内容，停止连载。"
          else
            # 注意：这里千万不要加 [skip ci]，否则不会触发下一轮自动续写
            git commit -m "自动续写新章节: 第 $(ls chapters | wc -l) 章"
            git push origin main
          fi
