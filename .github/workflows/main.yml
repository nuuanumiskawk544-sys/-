name: Infinite Ghost Writer

on:
  workflow_dispatch: # 强烈建议：通过手动点击按钮来开启“第一章”
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md' # 忽略 README 的修改，防止你改设定时触发乱码

permissions:
  contents: write

jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '完结')" # 如果提到完结，则彻底停止
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取完整历史，否则 push 必报 128 或 1

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      - name: AI 创作章节
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py
        
      - name: 自动审稿与逻辑校对
        run: python scripts/reviewer.py # 如果审稿失败，流程会在此中断
     
      - name: 内容自动质检与纠错
        run: python scripts/checker.py  # 插入质检脚本

      - name: 自动同步并推送
        run: |
          # 1. 强制配置身份，防止 Git 询问你是谁
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. 检查 chapters 目录是否存在，不存在则创建（防止 git add 报错导致 exit 2）
          mkdir -p chapters
          
          # 3. 拉取远程最新更改并合并（防止因远程有变动导致的推送失败）
          git pull origin main --rebase
          
          # 4. 暂存所有更改
          git add chapters/
          
          # 5. 核心：判断是否有实际变动再提交
          # 使用 git diff --staged 检查缓存区，如果没有文件变动，就不执行 commit
          if git diff --staged --quiet; then
            echo "⚠️ 没有检测到新章节生成，跳过本次推送。"
          else
            # 获取当前章节数作为提交信息
            CHAPTER_COUNT=$(ls chapters/*.md 2>/dev/null | wc -l)
            git commit -m "自动续写新章节: 第 ${CHAPTER_COUNT} 章"
            
            # 6. 推送到远程
            git push origin main
          fi
