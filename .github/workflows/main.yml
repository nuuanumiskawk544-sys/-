name: Infinite Ghost Writer 2026

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '*.txt'
      - 'chapters/**'
      - '.github/workflows/**'

permissions:
  contents: write 
  actions: write
  
jobs:
  write_next_chapter:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event.head_commit.message != null &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install openai

      steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 保证能推送到远程

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      # 第一步：运行记忆补全（含原文背景提炼）
      - name: 补全历史剧情摘要
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          if [ -f "fix_history.py" ]; then
            python fix_history.py
          fi

      # 第二步：运行小说续写
      - name: 运行小说生成脚本
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/writer.py

      # 第三步：整合后的统一提交推送
      - name: 统一提交并推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # 暂存所有修改
          git add world_state.json
          git add chapters/*.md || echo "No new chapters"
          
          # 检查变动并执行提交
          if git diff --staged --quiet; then
            echo "没有检测到任何文件变动，跳过提交。"
          else
            # 使用包含日期的动态提交信息
            git commit -m "自动续写同步：第 $(date +%F) 章节及全量摘要 [skip ci]"
            
            # 使用 rebase 模式拉取远程，防止分叉
            git pull origin main --rebase
            
            # 最终推送
            git push origin main
          fi
